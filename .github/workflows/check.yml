name: Check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.25.0"
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.4"
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: cd services/backend && uv sync --frozen
      - run: make check
